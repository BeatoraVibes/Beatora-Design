<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beatora Design</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
    color: white;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align: center;
    padding: 40px 20px;
}

.logo {
    font-size: 32px;
    font-weight: bold;
    color: gold;
}

.subtitle {
    color: #ccc;
}

.card {
    background: #111;
    border-radius: 15px;
    padding: 20px;
    margin: 15px 0;
    border: 1px solid rgba(255,215,0,0.2);
}

.price {
    float: right;
    color: gold;
    font-weight: bold;
}

.btn {
    display: inline-block;
    background: gold;
    color: black;
    padding: 10px 20px;
    border-radius: 25px;
    text-decoration: none;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
}

/* FORM POPUP */
.popup {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #111;
    padding: 25px;
    border-radius: 10px;
    width: 300px;
}

form input, form button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

form input {
    background: #222;
    color: white;
}

form button {
    background: gold;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="logo">Beatora Design</div>
    <p class="subtitle">Affordable Digital Solutions</p>
</div>

<!-- PRODUCTS -->
<div class="card">
    Templates + Captions <span class="price">₹349</span><br>
    <button class="btn" onclick="openForm('Templates + Captions ₹349')">I'm Interested</button>
</div>

<div class="card">
    Templates Only <span class="price">₹299</span><br>
    <button class="btn" onclick="openForm('Templates Only ₹299')">I'm Interested</button>
</div>

<div class="card">
    Restaurant Website <span class="price">₹2,499</span><br>
    <button class="btn" onclick="openForm('Restaurant Website ₹2,499')">I'm Interested</button>
</div>

<div class="card">
    Website with Domain <span class="price">₹5,999</span><br>
    <button class="btn" onclick="openForm('Website with Domain ₹5,999')">I'm Interested</button>
</div>

<div class="card">
    Mobile App <span class="price">₹6,999</span><br>
    <button class="btn" onclick="openForm('Mobile App ₹6,999')">I'm Interested</button>
</div>

<div class="card" style="border:2px solid gold;">
    Combo Offer ₹9,999<br>
    <button class="btn" onclick="openForm('Combo Offer ₹9,999')">I'm Interested</button>
</div>

</div>

<!-- POPUP FORM -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h3>Enter Details</h3>
        <form id="leadForm">
            <input type="text" id="name" placeholder="Name" required>
            <input type="tel" id="phone" placeholder="Phone" required>
            <input type="text" id="business" placeholder="Business Name" required>
            <button type="submit">Send</button>
        </form>
    </div>
</div>

<script>
let selectedProduct = "";

function openForm(product) {
    selectedProduct = product;
    document.getElementById("popup").style.display = "flex";
}

document.getElementById("leadForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let business = document.getElementById("business").value;

    let message = `New Lead:%0AName: ${name}%0APhone: ${phone}%0ABusiness: ${business}%0ASelected Plan: ${selectedProduct}`;

    let url = `https://wa.me/919021268038?text=${message}`;

    window.open(url, "_blank");
});
</script>

</body>
</html>
