<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beatora Design</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0d0d0d, #000);
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 50px 20px 20px;
}

.logo {
    font-size: 38px;
    font-weight: bold;
    background: linear-gradient(45deg, #ff00cc, #00f0ff);
    -webkit-background-clip: text;
    color: transparent;
}

.brand {
    font-size: 14px;
    letter-spacing: 3px;
    color: #aaa;
}

.title {
    font-size: 36px;
    margin-top: 20px;
    color: gold;
}

.subtitle {
    color: #bbb;
}

/* SOCIAL */
.social {
    margin-top: 20px;
}

.social a {
    display: inline-block;
    margin: 0 10px;
    font-size: 20px;
    color: gold;
    border: 1px solid gold;
    padding: 10px;
    border-radius: 50%;
    transition: 0.3s;
}

.social a:hover {
    background: gold;
    color: black;
}

/* BOX */
.box {
    background: #f7f3eb;
    color: black;
    border-radius: 20px;
    max-width: 900px;
    margin: auto;
    padding: 25px;
    box-shadow: 0 0 25px rgba(255,215,0,0.2);
}

/* PLAN */
.plan {
    padding: 18px;
    border-bottom: 1px solid #ddd;
}

.plan-name {
    margin-bottom: 10px;
    font-weight: 600;
}

.plan-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.plan-price {
    font-weight: bold;
    font-size: 18px;
}

.btn {
    background: linear-gradient(45deg, gold, orange);
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}

/* COMBO */
.combo {
    background: #111;
    border-radius: 20px;
    margin: 30px auto;
    padding: 20px;
    max-width: 900px;
    border: 1px solid gold;
}

.combo-title {
    color: gold;
    font-size: 22px;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.popup-box {
    background: #111;
    padding: 25px;
    border-radius: 10px;
    width: 300px;
}

.popup input {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #222;
    color: white;
}

.popup button {
    width: 100%;
    padding: 10px;
    background: gold;
    border: none;
    border-radius: 8px;
    font-weight: bold;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">beat<span style="color:white;">ora</span></div>
    <div class="brand">DESIGN</div>
    <div class="title">Pricing Plans</div>
    <div class="subtitle">Affordable Digital Solutions</div>

<!-- PRICING -->
<div class="box">

    <div class="plan">
        <div class="plan-name">2 Week Templates + 5 Captions</div>
        <div class="plan-bottom">
            <div class="plan-price">₹349</div>
            <button class="btn" onclick="openForm('Templates ₹349')">Add Interest</button>
        </div>
    </div>

    <div class="plan">
        <div class="plan-name">2 Week Templates (Without Captions)</div>
        <div class="plan-bottom">
            <div class="plan-price">₹299</div>
            <button class="btn" onclick="openForm('Templates ₹299')">Add Interest</button>
        </div>
    </div>

    <div class="plan">
        <div class="plan-name">Website for Restaurant/Cafe</div>
        <div class="plan-bottom">
            <div class="plan-price">₹2,499</div>
            <button class="btn" onclick="openForm('Website ₹2499')">Add Interest</button>
        </div>
    </div>

    <div class="plan">
        <div class="plan-name">Website with Personal Domain</div>
        <div class="plan-bottom">
            <div class="plan-price">₹5,999</div>
            <button class="btn" onclick="openForm('Domain ₹5999')">Add Interest</button>
        </div>
    </div>

    <div class="plan">
        <div class="plan-name">Publishable Application</div>
        <div class="plan-bottom">
            <div class="plan-price">₹6,999</div>
            <button class="btn" onclick="openForm('App ₹6999')">Add Interest</button>
        </div>
    </div>

</div>

<!-- COMBO -->
<div class="combo">
    <div class="combo-title">Combo Offer</div>
    <div><s>₹12,998</s></div>
    <div style="color:gold; font-size:22px;">₹9,999</div>
    <button class="btn" onclick="openForm('Combo ₹9999')">Add Interest</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <form id="form">
            <input type="text" id="name" placeholder="Name" required>
            <input type="tel" id="phone" placeholder="Phone" required>
            <input type="text" id="business" placeholder="Business Name" required>
            <button type="submit">Send</button>
        </form>
    </div>
</div>

    <!-- SOCIAL ICONS -->
    <div class="social">
        <a href="https://instagram.com/_3107_daksh" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://linkedin.com/in/daksh-mistry-265025286" target="_blank">
            <i class="fab fa-linkedin-in"></i>
        </a>
    </div>
</div>
    
<script>
let selected = "";

function openForm(plan){
    selected = plan;
    document.getElementById("popup").style.display = "flex";
}

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let business = document.getElementById("business").value;

    let msg = `Hi, I'm interested in ${selected}%0AName: ${name}%0APhone: ${phone}%0ABusiness: ${business}`;

    window.open(`https://wa.me/919021268038?text=${msg}`, "_blank");
});
</script>

</body>
</html>
